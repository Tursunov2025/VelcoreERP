# Deploy on Render: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: azmus-crm
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    # NOTE: Render is NOT the production data store. All production data lives
    # only on the local server (D:\AzmusERP\Data) and is served to the internet
    # through a Cloudflare/Tailscale tunnel in front of the local backend.
    # No persistent disk; DATABASE_GUARD intentionally disabled here.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_GUARD
        value: "false"
      - key: SKIP_DEMO_SEED
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  - type: web
    name: azmus-crm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Local production backend exposed via Cloudflare Tunnel (data stays on
      # D:\AzmusERP\Data). Update when the tunnel URL changes.
      - key: VITE_API_URL
        value: https://bonds-sapphire-alliance-exception.trycloudflare.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
