# erp.velcore.uz — React SPA (build with VITE_API_URL=https://api.velcore.uz)
server {
    listen 80;
    listen [::]:80;
    server_name erp.velcore.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.velcore.uz;

    ssl_certificate     /etc/letsencrypt/live/erp.velcore.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.velcore.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/velcore/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never serve SPA HTML for runtime API override file (breaks client JSON parse).
    location = /remote-api.json {
        return 404;
        add_header Cache-Control "no-store";
    }

    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
