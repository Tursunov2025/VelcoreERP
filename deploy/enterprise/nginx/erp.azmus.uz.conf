# erp.azmus.uz — React SPA
server {
    listen 80;
    listen [::]:80;
    server_name erp.azmus.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.azmus.uz;

    # certbot will inject ssl_certificate paths
    ssl_certificate     /etc/letsencrypt/live/erp.azmus.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.azmus.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/azmus/app/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /remote-api.json {
        add_header Cache-Control "no-store";
    }

    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
